{% extends "learning_logs/base.html" %}

{% block content %}
  <div class="page-header">
    <div>
      <h1 class="page-title" data-typewriter data-speed="34" data-delay="120">Add entry</h1>
      <p class="muted">
        <span data-typewriter data-text="Topic:" data-speed="18" data-delay="650"></span>
        <a class="color-link" href="{% url 'learning_logs:topic' topic.id %}">{{ topic }}</a>
      </p>
      <p class="muted" style="margin: 0;">
        <span
          data-typewriter
          data-text="Start typing below — the editor will follow your pace."
          data-speed="14"
          data-delay="1050"
        ></span>
      </p>
    </div>
  </div>

  <div class="card">
    <form action="{% url 'learning_logs:new_entry' topic.id %}" method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="actions">
        <button type="submit" name="submit" class="btn btn-primary">Publish entry</button>
        <a class="btn" href="{% url 'learning_logs:topic' topic.id %}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock content %}
