{% extends "learning_logs/base.html" %}

{% block content %}
  <div class="page-header">
    <div>
      <h1 class="page-title">Add entry</h1>
      <p class="muted">
        Topic:
        <a href="{% url 'learning_logs:topic' topic.id %}">{{ topic }}</a>
      </p>
    </div>
  </div>

  <div class="card">
    <form action="{% url 'learning_logs:new_entry' topic.id %}" method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="actions">
        <button type="submit" name="submit" class="btn btn-primary">Publish entry</button>
        <a class="btn" href="{% url 'learning_logs:topic' topic.id %}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock content %}
