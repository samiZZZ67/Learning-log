{% extends "learning_logs/base.html" %}

{% block content %}
  <div class="page-header">
    <div>
      <h1 class="page-title">New topic</h1>
      <p class="muted">Create a topic to organize your entries.</p>
    </div>
  </div>

  <div class="card">
    <form action="{% url 'learning_logs:new_topic' %}" method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="actions">
        <button class="btn btn-primary" type="submit">Add topic</button>
        <a class="btn" href="{% url 'learning_logs:topics' %}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock content %}
