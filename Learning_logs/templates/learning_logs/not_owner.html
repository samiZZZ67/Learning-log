{% extends "learning_logs/base.html" %}

{% block content %}
  <div class="page-header">
    <div>
      <h1 class="page-title">Access denied</h1>
      <p class="muted">You don’t have permission to change this topic.</p>
    </div>
  </div>

  <div class="card">
    <p class="text-danger">
      You cannot add entries to the topic “{{ topic }}” because it is not yours.
    </p>
    <div class="actions">
      <a class="btn" href="{% url 'learning_logs:topics' %}">Back to topics</a>
    </div>
  </div>
{% endblock content %}
