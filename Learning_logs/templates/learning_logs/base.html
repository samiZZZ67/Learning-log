<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Learning Log{% endblock title %}</title>
    <link rel="stylesheet" href="{% static 'learning_logs/site.css' %}">
    <script src="{% static 'learning_logs/site.js' %}" defer></script>
</head>
<body>
    <div class="app">
        <header class="site-header wrap">
            <nav class="nav" aria-label="Primary navigation">
                <div class="nav__left">
                    <a class="brand" href="{% url 'learning_logs:index' %}">Learning Log</a>
                    <a class="nav__link" href="{% url 'learning_logs:topics' %}">Topics</a>
                </div>

                <div class="nav__right">
                    {% if user.is_authenticated %}
                        <span class="nav__user">Signed in as {{ user.username }}</span>
                        <form class="nav__form" method="post" action="{% url 'users:logout' %}">
                            {% csrf_token %}
                            <button class="link-button" type="submit">Log out</button>
                        </form>
                    {% else %}
                        <a class="nav__link" href="{% url 'users:register' %}">Register</a>
                        <a class="nav__link" href="{% url 'users:login' %}">Log in</a>
                    {% endif %}
                </div>
            </nav>
        </header>

        <main class="wrap">
            <div class="content">
                {% block content %}{% endblock content %}
            </div>
        </main>
    </div>
</body>
</html>
